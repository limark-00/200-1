<!DOCTYPE html>
<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">


<title>
实验室安全监测
</title>


<link rel="stylesheet" href="/static/style.css">


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>


</head>



<body>



<!-- ======================
顶部
======================= -->


<header class="top-header">


<h1>

🧪 实验室安全监测

</h1>




<div class="user-box"
onclick="openProfile()">



<img src="/static/user.png">



<span>

张三

</span>



▼


</div>




</header>








<!-- ======================
整体布局
======================= -->


<div class="layout">





<!-- ======================
左侧菜单
======================= -->


<aside class="sidebar">





<div class="menu-title">

LabSafety

</div>







<!-- 首页 -->


<div class="menu-item active"

onclick="goPage('/')">

🏠 首页

</div>








<!-- 环境检测 -->


<div class="menu-group">


<div class="group-title">

📊 环境检测

</div>





<div class="submenu"

onclick="goPage('/temperature.html')">

🌡 温度检测

</div>




<div class="submenu"

onclick="goPage('/humidity.html')">

💧 湿度检测

</div>





<div class="submenu"

onclick="goPage('/gas.html')">

☁ 气体检测

</div>






<div class="submenu"

onclick="goPage('/light.html')">

💡 光照检测

</div>



</div>








<!-- 摄像头 -->


<div class="menu-item"

onclick="goPage('/camera.html')">

📷 摄像头管理

</div>







<!-- 个人信息 -->


<div class="menu-item"

onclick="openProfile()">

👤 个人信息

</div>







</aside>









<!-- ======================
主体
======================= -->


<main class="main-content">





<!-- 标题 -->


<div class="welcome-card">


<h2>

实验室安全监测系统

</h2>


<p>

实时监控温度、湿度、气体、光照环境

</p>


</div>









<!-- ======================
四个数据卡片
======================= -->


<div class="sensor-row">





<div class="sensor-card temperature">


<h3>

🌡 温度

</h3>


<div class="sensor-value"

id="temperature">

--

</div>


<span>

℃

</span>


</div>









<div class="sensor-card humidity">


<h3>

💧 湿度

</h3>


<div class="sensor-value"

id="humidity">

--

</div>


<span>

%

</span>


</div>









<div class="sensor-card gas">


<h3>

☁ 气体

</h3>


<div class="sensor-value"

id="gas">

--

</div>


<span>

%LEL

</span>


</div>









<div class="sensor-card light">


<h3>

💡 光照

</h3>


<div class="sensor-value"

id="light">

--

</div>


<span>

Lux

</span>


</div>






</div>









<!-- ======================
报警统计
======================= -->


<div class="dashboard-row">






<div class="info-panel">


<h3>

🚨 实时报警

</h3>


<p id="alarm">

暂无报警

</p>


</div>







<div class="info-panel">


<h3>

📊 今日数据统计

</h3>


<p>

数据采集正常

</p>


</div>







<div class="info-panel">


<h3>

🛡 安全评分

</h3>


<p id="score">

100分

</p>


</div>







</div>









<!-- ======================
传感器表
======================= -->



<div class="table-card">



<h2>

传感器信息数据表

</h2>






<table>


<tr>

<th>
项目
</th>


<th>
当前数据
</th>


<th>
状态
</th>


</tr>




<tr>

<td>
温度
</td>


<td id="tableTemp">
--
</td>


<td>
正常
</td>


</tr>





<tr>

<td>
湿度
</td>


<td id="tableHum">
--
</td>


<td>
正常
</td>


</tr>






<tr>

<td>
气体
</td>


<td id="tableGas">
--
</td>


<td>
正常
</td>


</tr>






<tr>

<td>
光照
</td>


<td id="tableLight">
--
</td>


<td>
正常
</td>


</tr>





</table>



</div>







</main>




</div>






<script src="/static/script.js"></script>




</body>


</html>
